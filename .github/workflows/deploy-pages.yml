# GitHub Pages only loads workflows from the repository ROOT .github folder.
# Site lives in "Pgnous Water Hub/".
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: Pgnous Water Hub/package-lock.json

      - name: Install
        working-directory: Pgnous Water Hub
        run: npm ci --registry https://registry.npmjs.org/

      - name: Build
        working-directory: Pgnous Water Hub
        run: npm run build

      - name: SPA fallback
        working-directory: Pgnous Water Hub
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: Pgnous Water Hub/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
